<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniSphere | Step 3: Recommendations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=IBM+Plex+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="feed">
    <div class="ambient"></div>
    <main class="layout">
      <header class="hero panel slide-up">
        <p class="eyebrow">UniSphere Wizard • Step 3 of 3</p>
        <h1>Your Dynamic Recommendations</h1>
        <p class="subtitle" id="feedSubtitle"></p>
        <div class="stats" id="metaStats"></div>
      </header>

      <section class="panel filters slide-up delay-1">
        <h2>Feed Controls</h2>
        <div class="grid three">
          <label>
            Domain
            <select id="filterDomain">
              <option value="">All</option>
              {% for domain in domains %}
              <option value="{{ domain }}">{{ domain|capitalize }}</option>
              {% endfor %}
            </select>
          </label>

          <label>
            Max Duration (minutes)
            <input id="maxDuration" type="number" min="1" max="600" value="180" />
          </label>

          <label>
            Result Limit
            <input id="resultLimit" type="number" min="5" max="100" value="25" />
          </label>
        </div>

        <div class="actions">
          <button type="button" id="refreshBtn">Refresh Results</button>
        </div>
        <p id="liveStatus" class="status">Content comes from live dynamic connectors. Open Link takes you to the original source.</p>
      </section>

      <section class="panel feed slide-up delay-2">
        <div class="feed-head">
          <h2>Unified Recommendation Feed</h2>
          <p id="feedbackSummary"></p>
        </div>
        <p id="feedMessage" class="status"></p>
        <div id="cards" class="cards"></div>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-top">
          <span class="badge"></span>
          <span class="score"></span>
        </div>
        <h3 class="title"></h3>
        <p class="desc"></p>
        <p class="reason"></p>
        <div class="meta"></div>
        <div class="tag-list"></div>
        <div class="card-actions">
          <button data-action="like">Like</button>
          <button data-action="save" class="ghost">Save</button>
          <button data-action="dislike" class="warn">Dislike</button>
          <button data-action="hide" class="warn ghost">Hide</button>
          <a class="open-link" target="_blank" rel="noopener">Open Link</a>
        </div>
      </article>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
