<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniSphere | Step 1: Interests</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=IBM+Plex+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="onboarding">
    <div class="ambient"></div>
    <main class="layout">
      <header class="hero panel slide-up">
        <p class="eyebrow">UniSphere Wizard • Step 1 of 3</p>
        <h1>Tell Us Your Interests</h1>
        <p class="subtitle">
          Pick relevant interests and describe your exact content demand. The agent will use this as the core intent signal.
        </p>
      </header>

      <section class="panel slide-up delay-1">
        <form id="onboardingForm">
          <div class="grid two">
            <label>
              User ID
              <input id="userId" name="userId" value="demo_user" minlength="3" required />
            </label>
            <label>
              Name
              <input id="name" name="name" value="Demo User" minlength="2" required />
            </label>
          </div>

          <fieldset>
            <legend>Select Interests</legend>
            <p class="helper">Choose at least 3 interests for stronger relevance.</p>
            <div class="interest-grid" id="interestOptions">
              {% for item in interest_options %}
              <label class="interest-pill">
                <input type="checkbox" name="interests" value="{{ item }}" />
                <span>{{ item }}</span>
              </label>
              {% endfor %}
            </div>
          </fieldset>

          <label>
            Describe Your Demand
            <textarea
              id="demandText"
              name="demandText"
              rows="5"
              placeholder="Example: I want recent AI startup case studies, practical engineering podcasts, and deep technology explainers in Hindi and English."
              required
            ></textarea>
          </label>

          <div class="actions">
            <button type="submit">Continue to Preferences</button>
          </div>
        </form>

        <p id="onboardingStatus" class="status"></p>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
